general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off. (rbw stays unlocked across sleep — hibernation images land in LUKS-encrypted swap, so no plaintext hits disk.)
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock system after 5 minutes (screensaver resets idle timer, so have to just do half + 2s margin)
listener {
    timeout = 152
    on-timeout = omarchy-system-lock
    on-resume = omarchy-system-wake
}

# Deliberately no idle-suspend/hibernate listener: the machine stays awake when
# inactive (on AC and battery alike). Low-battery hibernate at 5% (UPower
# CriticalPowerAction + battery-sentinel) remains as a data-loss safety net.
