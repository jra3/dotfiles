# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

env = GDK_SCALE,1.75

# LG SDQHD (stacked dual-QHD) — primary, on top
monitor = DP-1, 2560x2880@60, 0x0, 1.666667

# Laptop display — centered below the LG
monitor = eDP-1, 1920x1200@60, 191x1725, 1.666667

# Fallback for any other monitors
monitor = , preferred, auto, 1.666667

# Lid switch: disable laptop display when closed, re-enable when opened
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1200@60, 0x0, 1.666667"
