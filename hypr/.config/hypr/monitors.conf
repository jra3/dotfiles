# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

env = GDK_SCALE,1.75

# Fallback for any other monitors (must come first — Hyprland applies the last matching rule).
monitor = , preferred, auto, 1.666667

# LG SDQHD (stacked dual-QHD) — primary, on top.
# Match by description so it works across offices regardless of which DP port it lands on.
monitor = desc:LG Electronics LG SDQHD, 2560x2880@60, 0x0, 1.666667

# Laptop display — centered below the LG
monitor = eDP-1, 2560x1600@165, 191x1728, 1.666667

# Lid switch: disable laptop display when closed, re-enable when opened
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2560x1600@165, 0x0, 1.666667"
