# Shared monitor config for all hosts.
# Hyprland applies the last matching rule, and silently ignores rules whose
# monitor isn't connected — so we list every display across all machines
# and let each host pick up the rules that apply.
#
# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and modes: hyprctl monitors

env = GDK_SCALE,1.75

# Fallback for any other monitors (must come first — last matching rule wins).
monitor = , preferred, auto, 1.666667

# LG SDQHD (stacked dual-QHD) — desktop primary. Match by description so it
# works regardless of which port (HDMI/DP) it lands on.
monitor = desc:LG Electronics LG SDQHD, 2560x2880@60, 0x0, 1.666667

# Laptop internal display. Positioned below the LG for the docked setup.
monitor = eDP-1, 2560x1600@165, 191x1728, 1.666667
