# Unbind SUPER+T so Helium can use it for new tabs (macOS muscle memory)
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
unbind = SUPER, T

# Application bindings
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, E, Emacsclient, exec, uwsm-app -- env GDK_BACKEND=wayland emacsclient -c -a ""
bindd = SUPER SHIFT ALT, E, Emacs, exec, uwsm-app -- env GDK_BACKEND=wayland emacs
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER CTRL, P, Tailscale, exec, omarchy-launch-tui tsui
# Signal scratchpad
bindd = SUPER SHIFT, G, Signal, exec, hyprctl clients -j | jq -e '.[] | select(.class=="signal")' >/dev/null && hyprctl dispatch togglespecialworkspace signal || uwsm-app -- signal-desktop
windowrule = workspace special:signal, match:class ^signal$
# Obsidian scratchpad
bindd = SUPER SHIFT, O, Obsidian, exec, hyprctl clients -j | jq -e '.[] | select(.class=="obsidian")' >/dev/null && hyprctl dispatch togglespecialworkspace obsidian || uwsm-app -- obsidian -disable-gpu --enable-wayland-ime
windowrule = workspace special:obsidian, match:class ^obsidian$
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bw-pick

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# Claude scratchpad
bindd = SUPER SHIFT, A, Claude, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-claude.ai"))' >/dev/null && hyprctl dispatch togglespecialworkspace claude || omarchy-launch-webapp "https://claude.ai"
windowrule = workspace special:claude, match:class chrome-claude\.ai.*
# Calendar scratchpad
bindd = SUPER SHIFT, C, Calendar, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-calendar.google.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace calendar || omarchy-launch-webapp "https://calendar.google.com"
windowrule = workspace special:calendar, match:class chrome-calendar\.google\.com.*
# Email scratchpad
bindd = SUPER SHIFT, M, Email, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-mail.google.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace mail || omarchy-launch-webapp "https://mail.google.com"
windowrule = workspace special:mail, match:class chrome-mail\.google\.com.*
# YouTube scratchpad
bindd = SUPER SHIFT, Y, YouTube, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-youtube.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace youtube || omarchy-launch-webapp "https://youtube.com/"
windowrule = workspace special:youtube, match:class chrome-youtube\.com.*
# Chessly scratchpad
bindd = SUPER SHIFT, K, Chessly, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-chessly.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace chessly || omarchy-launch-webapp "https://chessly.com/home"
windowrule = workspace special:chessly, match:class chrome-chessly\.com.*
bindd = SUPER SHIFT ALT, K, Chess, exec, omarchy-launch-or-focus-webapp Chess "https://chess.com/home"

# Linear scratchpad
bindd = SUPER SHIFT, L, Linear, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-linear.app"))' >/dev/null && hyprctl dispatch togglespecialworkspace linear || omarchy-launch-webapp "https://linear.app"
windowrule = workspace special:linear, match:class chrome-linear\.app.*
bindd = SUPER SHIFT, N, Worktree workspace, exec, setsid uwsm-app -- xdg-terminal-exec --app-id=org.omarchy.worktree-workspace -e /home/jallen/.local/bin/worktree-workspace "$(omarchy-cmd-terminal-cwd)"
# Slack scratchpad
bindd = SUPER SHIFT, S, Slack, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-app.slack.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace slack || omarchy-launch-webapp "https://app.slack.com/client/T04MQQ4C0LU/D0936HPFMQT"
windowrule = workspace special:slack, match:class chrome-app\.slack\.com.*
# Apple Music scratchpad (chromium, not Helium — needs Widevine L1 for full playback)
bindd = SUPER SHIFT, P, Apple Music, exec, hyprctl clients -j | jq -e '.[] | select(.class | startswith("chrome-music.apple.com"))' >/dev/null && hyprctl dispatch togglespecialworkspace music || setsid uwsm-app -- chromium --app=https://music.apple.com
windowrule = workspace special:music, match:class chrome-music\.apple\.com.*

# bindd = SUPER SHIFT, C, Org Capture, exec, $terminal --app-id=TUI.float -e ~/.local/bin/org-capture

# Unbind Print Screen keys (no Print key on keyboard)
# unbind = , Print
# unbind = SHIFT, Print
# unbind = ALT, Print

bindd = SUPER CTRL, 3, Screenshot fullscreen, exec, omarchy-cmd-screenshot fullscreen
bindd = SUPER CTRL, 4, Screenshot selection, exec, omarchy-cmd-screenshot smart
bindd = SUPER CTRL, 5, Screenshot menu, exec, omarchy-menu screenrecord
bindd = SUPER ALT CTRL, 3, Screenshot fullscreen to clipboard, exec, omarchy-cmd-screenshot fullscreen clipboard
bindd = SUPER ALT CTRL, 4, Screenshot selection to clipboard, exec, omarchy-cmd-screenshot smart clipboard

# Dictation via mouse side button (hold to dictate, release to stop)
bindd  = , mouse:275, Start dictation, exec, voxtype record start
binddr = , mouse:275, Stop dictation, exec, voxtype record stop

# Dictation via foot pedal (XF86Tools / F13)
bindd  = , XF86Tools, Start dictation, exec, voxtype record start
binddr = , XF86Tools, Stop dictation, exec, voxtype record stop

# Custom keys from QMK firmware (Framework 16 ANSI keymap "john").
# Keyboard sends HYPER+F12/F13/F14 for these utility keys on the F-row.
bindd = CTRL SHIFT ALT SUPER, F12, Mic mute toggle, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindd = CTRL SHIFT ALT SUPER, 8, Notification silencing, exec, omarchy-toggle-notification-silencing
bindd = CTRL SHIFT ALT SUPER, 9, Voxtype toggle, exec, voxtype record toggle
