# Point SSH_AUTH_SOCK at the systemd-managed OpenSSH ssh-agent socket.
# (OpenSSH's own agent — not gnome-keyring's — so FIDO2/sk resident keys and
#  `ssh-add -K` work.) Read by the systemd user session at login via uwsm.
#
# One-time per machine, enable the agent:
#   systemctl --user enable --now ssh-agent.socket
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket
